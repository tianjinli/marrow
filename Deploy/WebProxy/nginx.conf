# 全局事件配置
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # 1. 🟢 前台网站反向代理
    server {
        listen 80;
        server_name www.yourgame.com; # 或者是宿主机 IP

        location / {
            proxy_pass http://web-front:9000; # 指向 Compose 内部服务
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 转发 WebForms 核心动态接口
        location ~ \.(aspx|ashx|asmx|config)$ {
            proxy_pass http://web-front:9000;
            proxy_set_header Host $host;
        }
    }

    # 2. 🔵 后台网站反向代理
    server {
        listen 80;
        server_name admin.yourgame.com;

        location / {
            proxy_pass http://web-admin:80; # 指向 Compose 内部服务
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ \.(aspx|ashx|asmx|config)$ {
            proxy_pass http://web-admin:80;
            proxy_set_header Host $host;
        }
    }
}
